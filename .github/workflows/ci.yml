name: CI - Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: referai_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U test_user -d referai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build Backend
        working-directory: backend
        run: mvn clean compile

      - name: Run Backend Tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/referai_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: mvn clean verify

      - name: Upload JaCoCo Coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Current Directory
        run: pwd

      - name: List Repository Files
        run: ls -R

      - name: Show Frontend package.json
        run: cat frontend/package.json

      - name: Show Lint Script
        working-directory: frontend
        run: npm pkg get scripts.lint

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Show ESLint Version
        working-directory: frontend
        run: npx eslint --version

      - name: Run Lint
        working-directory: frontend
        run: npm run lint

      - name: Type Check
        working-directory: frontend
        run: npm run type-check

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  docker-build:
    runs-on: ubuntu-latest

    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: backend
          dockerfile: docker/Dockerfile.backend
          push: false

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          dockerfile: docker/Dockerfile.frontend
          push: false